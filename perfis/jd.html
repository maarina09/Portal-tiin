
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#efefef;
}

.container{
    display:flex;
    padding:20px;
    gap:20px;
}

/* MENU LATERAL */

.menu{
    width:180px;
    height:650px;
    background:#82a7ff;
    border-radius:10px;
}

/* CONTEÚDO */

.conteudo{
    flex:1;
}

/* PESQUISA */

.topo{
    background:#82a7ff;
    padding:10px;
    border-radius:10px;
}

.pesquisa{
    width:220px;
    height:30px;
    background:white;
    border-radius:20px;
    padding-left:15px;
    display:flex;
    align-items:center;
    color:#555;
}

/* PERFIL */

.perfil{
    margin-top:20px;
    background:#82a7ff;
    border-radius:10px;
    padding:15px;
}

.perfil h3{
    margin-bottom:15px;
}

/* FOTO */

.foto{
    width:140px;
    height:140px;
    border-radius:50%;
    background:white;
    border:3px solid #4f7df7;
    margin-bottom:10px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#777;
    font-size:14px;
}

.botao{
    display:inline-block;
    background:#3465e3;
    color:white;
    padding:8px 18px;
    border-radius:6px;
    cursor:pointer;
}

/* DADOS */

.dados{
    margin-top:20px;
    background:#82a7ff;
    border:2px solid red;
    border-radius:8px;
    padding:20px;
}

.linha{
    display:flex;
    gap:40px;
    margin-bottom:30px;
}

.campo{
    flex:1;
}

.campo label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
}

/* Retângulos brancos (não são input) */

.caixa{
    width:100%;
    height:35px;
    background:white;
    border-radius:6px;
    display:flex;
    align-items:center;
    padding-left:10px;
    cursor:pointer;
    user-select:none;
}

.grande{
    width:300px;
}

/* ENDEREÇO */

.endereco{
    margin-top:20px;
    background:#82a7ff;
    border:2px solid blueviolet;
    border-radius:8px;
    padding:20px;
}

.titulo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.end-linha{
    display:flex;
    justify-content:space-between;
}

.end-item{
    width:30%;
}

.valor{
    margin-top:10px;
    background:white;
    height:35px;
    border-radius:6px;
    display:flex;
    align-items:center;
    padding-left:10px;
}
</style>

</head>
<body>

<div class="container">

<div class="menu"></div>

<div class="conteudo">

<div class="topo">
<div class="pesquisa">Pesquisar...</div>
</div>

<div class="perfil">

<h3>Meu perfil</h3>

<div class="foto">
Foto
</div>

<div class="botao">
Escolher Foto
</div>

<p style="margin-top:20px;">Usuário</p>
<p>Admin</p>

</div>

<div class="dados">

<div class="linha">

<div class="campo">
<label>Joana</label>
<div class="caixa"></div>
</div>

<div class="campo">
<label>Nunes</label>
<div class="caixa"></div>
</div>

<div class="campo">
<label>20/01/2010</label>
<div class="caixa"></div>
</div>

</div>

<div class="linha">

<div class="campo grande">
<label>isadoradutra2021nunes@gmail.com</label>
<div class="caixa"></div>
</div>

</div>

</div>

<div class="endereco">

<div class="titulo">Sc-401, 3730 - Saco Grande, Florianópolis</div>

<div class="end-linha">

<div class="end-item">
País
<div class="valor">Brasil</div>
</div>

Cidade

</div>

Código postal

</div>

</div>

</div>

</div>

</div>

</body>
</html>
